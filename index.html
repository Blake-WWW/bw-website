<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blake Williams</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --text-primary: #f0f0ff;
      --text-muted: #7a7060;
      --accent: #a8895a;
    }

    html, body {
      height: 100%;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #000;
      color: var(--text-primary);
      overflow: hidden;
    }

    /* â”€â”€ Wave canvas â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ */
    #waveCanvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
    }

    /* â”€â”€ Mouse glow â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ */
    #glowCursor {
      position: fixed;
      width: 500px;
      height: 500px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(61,107,42,0.08) 0%, transparent 65%);
      pointer-events: none;
      transform: translate(-50%, -50%);
      z-index: 1;
    }

    /* â”€â”€ Layout â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ */
    main {
      position: relative;
      z-index: 2;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 48px;
    }

    /* â”€â”€ Profile â€” horizontal strip â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ */
    .profile {
      display: flex;
      align-items: center;
      gap: 56px;
      width: 100%;
      max-width: 1000px;
      animation: fadeUp 0.8s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* â”€â”€ Avatar â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ */
    .avatar-wrapper {
      flex-shrink: 0;
      width: 180px;
      height: 180px;
      border-radius: 50%;
      border: 4px solid transparent;
      background:
        linear-gradient(#0d0a20, #0d0a20) padding-box,
        conic-gradient(from 0deg, #3d6b2a, #6b8c3a, #a8895a, #7c5233, #2d5a1e, #3d6b2a) border-box;
    }

    .avatar-wrapper img {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      object-fit: cover;
      object-position: center 18%;
      display: block;
    }

    /* â”€â”€ Identity block â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ */
    .identity {
      flex-shrink: 0;
    }

    h1 {
      position: relative;
      font-size: 3.2rem;
      font-weight: 800;
      letter-spacing: -0.045em;
      line-height: 1;
      text-shadow: 0 2px 32px rgba(0,0,0,0.9);
      margin-bottom: 14px;
      animation: glitch-main 5s infinite;
    }

    h1::before,
    h1::after {
      content: attr(data-text);
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      font-size: inherit;
      font-weight: inherit;
      letter-spacing: inherit;
      line-height: inherit;
      pointer-events: none;
    }

    h1::before {
      color: #b44fff;
      animation: glitch-r 5s infinite;
    }

    h1::after {
      color: #00eeff;
      animation: glitch-b 5s infinite;
    }

    @keyframes glitch-main {
      0%, 88%, 100% { transform: none; filter: none; }
      89%   { transform: translateX(-2px) skewX(-1.5deg); filter: brightness(1.15); }
      90%   { transform: translateX(3px)  skewX(0.5deg); }
      91%   { transform: none; filter: none; }
      95%   { transform: translateX(1px); filter: brightness(1.05); }
      95.5% { transform: none; filter: none; }
    }

    @keyframes glitch-r {
      0%, 88%, 100% { opacity: 0; }
      89%   { opacity: 0.85; transform: translateX(-5px); clip-path: polygon(0 18%, 100% 18%, 100% 44%, 0 44%); }
      89.5% { transform: translateX(3px);  clip-path: polygon(0 58%, 100% 58%, 100% 78%, 0 78%); }
      90%   { transform: translateX(-2px); clip-path: polygon(0 4%,  100% 4%,  100% 22%, 0 22%); }
      90.5% { opacity: 0; }
      95%   { opacity: 0.65; transform: translateX(4px); clip-path: polygon(0 48%, 100% 48%, 100% 70%, 0 70%); }
      95.5% { opacity: 0; }
    }

    @keyframes glitch-b {
      0%, 89%, 100% { opacity: 0; }
      89.5% { opacity: 0.85; transform: translateX(5px);  clip-path: polygon(0 33%, 100% 33%, 100% 54%, 0 54%); }
      90%   { transform: translateX(-3px); clip-path: polygon(0 68%, 100% 68%, 100% 88%, 0 88%); }
      90.5% { transform: translateX(2px);  clip-path: polygon(0 8%,  100% 8%,  100% 28%, 0 28%); }
      91%   { opacity: 0; }
      95.5% { opacity: 0.7; transform: translateX(-5px); clip-path: polygon(0 38%, 100% 38%, 100% 62%, 0 62%); }
      96%   { opacity: 0; }
    }

    .tagline-row {
      display: flex;
      flex-direction: row;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      gap: 10px;
    }

    .company-link {
      display: inline-flex;
      align-items: center;
      border-radius: 6px;
      overflow: hidden;
      opacity: 0.88;
      transition: opacity 0.2s, transform 0.2s ease;
      flex-shrink: 0;
    }

    .company-link:hover {
      opacity: 1;
      transform: scale(1.05);
    }

    .company-logo {
      height: 20px;
      width: auto;
      display: block;
    }

    .tagline {
      font-size: 0.88rem;
      font-weight: 600;
      color: var(--accent);
      letter-spacing: 0.18em;
      text-transform: uppercase;
      text-shadow: 0 0 20px rgba(168,137,90,0.5);
      position: relative;
      cursor: default;
      text-decoration: underline;
      text-decoration-color: rgba(168,137,90,0.45);
      text-decoration-thickness: 2px;
      text-underline-offset: 3px;
      display: inline-block;
      max-width: 94%;
    }

    .tagline .tooltip {
      visibility: hidden;
      opacity: 0;
      position: absolute;
      top: calc(100% + 10px);
      left: 0;
      width: 240px;
      background: rgba(13, 18, 10, 0.88);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(100, 140, 60, 0.25);
      border-radius: 8px;
      padding: 12px 14px;
      font-size: 0.75rem;
      font-weight: 400;
      letter-spacing: 0.02em;
      text-transform: none;
      color: rgba(220, 210, 190, 0.88);
      line-height: 1.55;
      text-shadow: none;
      pointer-events: none;
      transition: opacity 0.25s ease, transform 0.25s ease, visibility 0.25s ease;
      transform: translateY(4px);
      z-index: 100;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }

    .tagline:hover .tooltip {
      visibility: visible;
      opacity: 1;
      transform: translateY(0);
    }

    /* â”€â”€ Vertical separator â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ */
    .sep {
      flex-shrink: 0;
      width: 1px;
      height: 100px;
      background: linear-gradient(to bottom, transparent, rgba(255,255,255,0.18), transparent);
    }

    /* â”€â”€ Links row â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ */
    .links {
      display: flex;
      flex-direction: row;
      gap: 16px;
    }

    .link {
      width: 62px;
      height: 62px;
      border-radius: 18px;
      border: 1px solid rgba(255,255,255,0.09);
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      display: flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      transition: background 0.2s, border-color 0.2s,
                  transform 0.25s cubic-bezier(0.22,1,0.36,1), box-shadow 0.2s;
      opacity: 0;
      animation: fadeUp 0.6s cubic-bezier(0.22,1,0.36,1) forwards;
    }

    .link:nth-child(1) { animation-delay: 0.25s; }
    .link:nth-child(2) { animation-delay: 0.32s; }
    .link:nth-child(3) { animation-delay: 0.39s; }
    .link:nth-child(4) { animation-delay: 0.46s; }

    .link:hover {
      background: rgba(61,107,42,0.22);
      border-color: rgba(168,137,90,0.32);
      transform: translateY(-3px);
      box-shadow: 0 8px 24px rgba(109,40,217,0.3);
    }

    .link:active { transform: translateY(-1px) scale(0.97); }

    .link svg { width: 26px; height: 26px; transition: transform 0.2s; }
    .link:hover svg { transform: scale(1.12); }

    .link-email    { color: #c9b48a; }
    .link-github   { color: #b5c9a0; }
    .link-linkedin { color: #8aab7a; }
    .link-instagram { color: #c4956a; }

    /* -- Individual letter glitch ----------------------- */
    h1 .letter { display: inline-block; position: relative; }
    .lg-1 { animation: lg-anim-1 0.28s steps(1) forwards; }
    .lg-2 { animation: lg-anim-2 0.22s steps(1) forwards; }
    .lg-3 { animation: lg-anim-3 0.32s steps(1) forwards; }
    @keyframes lg-anim-1 {
      0%   { transform: none; color: inherit; opacity: 1; }
      25%  { transform: translateX(-5px) skewX(-25deg); color: #b44fff; opacity: 0.7; text-shadow: 3px 0 #00eeff; }
      50%  { transform: translateX(4px) scaleY(1.5); color: #00eeff; text-shadow: -3px 0 #b44fff; }
      75%  { transform: skewX(10deg) scaleY(0.6); color: #b44fff; opacity: 0.9; }
      100% { transform: none; color: inherit; opacity: 1; text-shadow: none; }
    }
    @keyframes lg-anim-2 {
      0%   { transform: none; color: inherit; opacity: 1; }
      33%  { transform: translateY(-4px) translateX(3px); color: #00eeff; opacity: 0.6; }
      66%  { transform: translateY(3px) translateX(-4px) skewX(-15deg); color: #b44fff; opacity: 1; }
      100% { transform: none; color: inherit; opacity: 1; }
    }
    @keyframes lg-anim-3 {
      0%   { transform: none; opacity: 1; color: inherit; }
      20%  { transform: scaleX(1.6) translateX(2px); color: #b44fff; opacity: 0.5; text-shadow: -4px 0 #00eeff; }
      40%  { transform: scaleX(0.4) translateX(-3px); color: #00eeff; opacity: 1; }
      60%  { transform: scaleY(1.4) skewX(20deg); color: #b44fff; }
      80%  { transform: translateX(2px); color: inherit; opacity: 0.8; }
      100% { transform: none; color: inherit; opacity: 1; text-shadow: none; }
    }
    /* â”€â”€ Responsive: stack on small screens â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ */
    @media (max-width: 700px) {
      body { overflow-y: auto; }
      main { padding: 48px 24px; align-items: flex-start; }

      .profile {
        flex-direction: column;
        align-items: center;
        text-align: center;
        gap: 28px;
      }

      .sep { width: 60px; height: 1px; }

      .links { grid-template-columns: 1fr; width: 100%; max-width: 320px; }

      h1 { font-size: 2rem; }
    }

    @media (prefers-reduced-motion: reduce) {
      .profile, .link { animation: none !important; opacity: 1 !important; transform: none !important; }
    }
  </style>
</head>

  <script>
    // -- Individual letter glitch --
    (function() {
      var h1 = document.querySelector('h1');
      var name = 'Blake Williams';
      h1.innerHTML = name.split('').map(function(ch) {
        return ch === ' ' ? ' ' : '<span class="letter">' + ch + '</span>';
      }).join('');
      var letters = Array.from(h1.querySelectorAll('.letter')).filter(function(s) { return s.textContent.trim(); });
      var variants = ['lg-1', 'lg-2', 'lg-3'];
      function glitchBurst() {
        var count = Math.random() < 0.4 ? 1 : Math.random() < 0.7 ? 2 : 3;
        var pool = letters.slice().sort(function() { return Math.random() - 0.5; }).slice(0, count);
        pool.forEach(function(el, i) {
          setTimeout(function() {
            if (el.className.indexOf('lg-') !== -1) return;
            var cls = variants[Math.floor(Math.random() * variants.length)];
            el.classList.add(cls);
            el.addEventListener('animationend', function() { el.classList.remove(cls); }, { once: true });
          }, i * (30 + Math.random() * 60));
        });
        setTimeout(glitchBurst, 600 + Math.random() * 2800);
      }
      setTimeout(glitchBurst, 1200);
    })();
    // -- Wave background --
    const canvas = document.getElementById('waveCanvas');
    const ctx    = canvas.getContext('2d');
    let W, H;

    function resize() {
      W = canvas.width  = window.innerWidth;
      H = canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    function waveColor(i) {
      const accents = { 4: [35, 52, 34], 10: [28, 46, 32], 16: [45, 54, 38] };
      if (accents[i]) return accents[i];
      return [100 + (Math.random() - 0.5) * 12, 32 + Math.random() * 10, 26 + Math.random() * 10];
    }

    const WAVE_COUNT = 20;
    const waves = Array.from({ length: WAVE_COUNT }, (_, i) => {
      const [h, s, l] = waveColor(i);
      return {
        y:         i / (WAVE_COUNT - 1),
        amp:       18 + Math.random() * 28,
        freq:      0.003 + Math.random() * 0.005,
        phase:     Math.random() * Math.PI * 2,
        speed:     (0.004 + Math.random() * 0.006) * (Math.random() < 0.5 ? 1 : -1),
        hue: h, sat: s, lum: l,
        opacity:   0.16 + Math.random() * 0.26,
        lineWidth: 0.7 + Math.random() * 1.2,
      };
    });

    function draw() {
      ctx.clearRect(0, 0, W, H);
      for (const w of waves) {
        w.phase += w.speed;
        ctx.beginPath();
        for (let x = 0; x <= W; x += 4) {
          const proximity = Math.max(0, 1 - Math.abs(my - w.y * H) / (H * 0.3));
          const nudge = Math.exp(-Math.pow((x - mx) / (W * 0.18), 2)) * proximity * 14;
          const y = w.y * H
            + Math.sin(x * w.freq + w.phase) * w.amp
            + Math.sin(x * w.freq * 0.53 + w.phase * 0.71) * (w.amp * 0.4)
            + nudge;
          x === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
        }
        ctx.strokeStyle = `hsla(${w.hue},${w.sat}%,${w.lum}%,${w.opacity})`;
        ctx.lineWidth   = w.lineWidth;
        ctx.shadowBlur  = 4;
        ctx.shadowColor = `hsla(${w.hue},${w.sat}%,${w.lum}%,0.2)`;
        ctx.stroke();
      }
      ctx.shadowBlur = 0;
      requestAnimationFrame(draw);
    }
    requestAnimationFrame(draw);

    // -- Mouse glow + subtle wave interaction --
    const glow = document.getElementById('glowCursor');
    let tx = W / 2, ty = H / 2, cx = W / 2, cy = H / 2;
    let mx = W / 2, my = H / 2, tmx = W / 2, tmy = H / 2;

    document.addEventListener('mousemove', e => { tx = e.clientX; ty = e.clientY; tmx = e.clientX; tmy = e.clientY; });
    document.addEventListener('mouseleave', () => glow.style.opacity = '0');
    document.addEventListener('mouseenter', () => glow.style.opacity = '1');

    (function tick() {
      cx += (tx - cx) * 0.07;
      cy += (ty - cy) * 0.07;
      mx += (tmx - mx) * 0.05;
      my += (tmy - my) * 0.05;
      glow.style.left = cx + 'px';
      glow.style.top  = cy + 'px';
      requestAnimationFrame(tick);
    })();
  </script>
